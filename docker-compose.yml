version: '3.8'

services:
  netty:
    build: ./netty-core
    ports:
      - "8080:8080"     # WebSocket + HTTP API
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # Docker API access for orchestrator
    environment:
      - DOCKER_WORKER_IMAGE=netty-python-worker
      - DOCKER_NETWORK=netty-bridge
      - WARM_POOL_SIZE=5
      - IDLE_TIMEOUT_MINUTES=30
    networks:
      - netty-bridge

  # Build-only: creates the worker image used by DockerOrchestrator.
  # Not started by `docker-compose up` — just builds the image.
  python-worker-image:
    build: ./python-worker
    image: netty-python-worker
    profiles: ["build-only"]

networks:
  netty-bridge:
    driver: bridge
