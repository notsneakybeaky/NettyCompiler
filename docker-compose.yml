version: '3.8'

services:
  netty:
    build: ./netty-core
    ports:
      - "8080:8080"     # WebSocket + HTTP API
    depends_on:
      - python-worker
    environment:
      - PYTHON_BRIDGE_URL=http://python-worker:8000

  python-worker:
    build: ./python-worker
    ports:
      - "8000:8000"
    restart: always     # auto-restart on script crash
